<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chicken Road Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2a2a2a;
            --green-color: #58a65c;
            --gold-color: #bfa15f;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        .header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background-color: #111;
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
        }
        .logo span { color: #f39c12; }

        .balance-box {
            background-color: #222;
            padding: 5px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            border: 1px solid #444;
            cursor: pointer;
        }

        .balance-box span {
            color: #f1c40f;
            margin-left: 5px;
            font-weight: bold;
        }

        /* Spielfeld */
        #game-container {
            flex: 1;
            width: 100%;
            max-width: 400px;
            position: relative;
            background-color: #333;
            background-image: linear-gradient(#444 2px, transparent 2px), linear-gradient(90deg, #444 2px, transparent 2px);
            background-size: 40px 40px;
        }

        /* LEADERBOARD (NEU!) */
        .leaderboard-section {
            width: 90%;
            max-width: 400px;
            background-color: #222;
            margin: 10px 0;
            padding: 10px 5%;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .leaderboard-title {
            font-size: 14px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .leaderboard-table tr {
            border-bottom: 1px solid #333;
        }

        .leaderboard-table tr:last-child {
            border-bottom: none;
        }

        .leaderboard-table td {
            padding: 6px 0;
        }

        .rank { width: 30px; color: #f39c12; font-weight: bold; }
        .username { color: #fff; }
        .score { text-align: right; color: #f1c40f; font-weight: bold; }

        /* Steuerungs-Panel unten */
        .control-panel {
            width: 90%;
            max-width: 400px;
            background-color: var(--panel-color);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 15px 5% 25px 5%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bet-selection {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .bet-btn {
            background-color: #333;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-main {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 17px;font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .btn-cashout { background-color: var(--gold-color); }
        .btn-go { background-color: var(--green-color); }

        .nav-menu { display: flex; gap: 10px; }
        .nav-item { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

        .overlay-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">CHICKEN<span>2</span>ROAD</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="balance-box" onclick="openMenu('shop')">
                <div id="user-balance">100</div> <span>🪙</span>
            </div>
            <div class="nav-menu">
                <button class="nav-item" onclick="openMenu('settings')">⚙️</button>
                <button class="nav-item" onclick="openMenu('wallet')">👛</button>
            </div>
        </div>
    </div>

    <!-- Spielfeld -->
    <div id="game-container"></div>

    <!-- LEADERBOARD TABELLE (NEU!) -->
    <div class="leaderboard-section">
        <div class="leaderboard-title">🏆 TOP GEWINNER</div>
        <table class="leaderboard-table">
            <tr>
                <td class="rank">#1</td>
                <td class="username">Kurdo_Gamer</td>
                <td class="score">999.749 🪙</td>
            </tr>
            <tr>
                <td class="rank">#2</td>
                <td class="username">Ahmet_07</td>
                <td class="score">452.120 🪙</td>
            </tr>
            <tr>
                <td class="rank">#3</td>
                <td class="username">CryptoKing</td>
                <td class="score">120.400 🪙</td>
            </tr>
        </table>
    </div>

    <!-- Panel unten -->
    <div class="control-panel">
        <div class="bet-selection">
            <button class="bet-btn" onclick="setBet(0.5)">0.5 🪙</button>
            <button class="bet-btn" onclick="setBet(1)">1 🪙</button>
            <button class="bet-btn" onclick="setBet(2)">2 🪙</button>
            <button class="bet-btn" onclick="setBet(5)">5 🪙</button>
        </div>

        <div class="action-btns">
            <button class="btn-main btn-cashout" onclick="cashOut()">CASH OUT<br><span id="win-amount">0.00 USD</span></button>
            <button class="btn-main btn-go" onclick="startGame()">GO</button>
        </div>
    </div>

    <!-- SHOP OVERLAY -->
    <div id="shop-menu" class="overlay-menu">
        <h2>MÜNZ-SHOP</h2>
        <button style="padding:10px; margin:5px; width:200px;" onclick="buyCoins(10, 10)">10 Münzen = 10€</button><br>
        <button style="padding:10px; margin:5px; width:200px;" onclick="buyCoins(50, 50)">50 Münzen = 50€</button><br>
        <button style="padding:10px; margin:5px; width:200px;" onclick="buyCoins(100, 80)">100 Münzen = 80€</button><br>
        <button style="padding:10px; margin:15px;" onclick="closeMenus()">Schließen</button>
    </div>

    <!-- SETTINGS OVERLAY -->
    <div id="settings-menu" class="overlay-menu">
        <h2>SPRACHE / LANGUAGE</h2>
        <button style="padding:10px; margin:5px; width:150px;" onclick="setLanguage('de')">Deutsch</button>
        <button style="padding:10px; margin:5px; width:150px;" onclick="setLanguage('tr')">Türkçe</button>
        <button style="padding:10px; margin:5px; width:150px;" onclick="setLanguage('ar')">العربية</button>
        <button style="padding:10px; margin:5px; width:150px;" onclick="setLanguage('en')">English</button>
        <button style="padding:10px; margin:5px; width:150px;" onclick="setLanguage('ru')">Русский</button><br>
        <button style="padding:10px; margin:15px;" onclick="closeMenus()">Schließen</button>
    </div><!-- WALLET / PAYPAL OVERLAY -->
    <div id="wallet-menu" class="overlay-menu">
        <h2>AUSZAHLUNG / WALLET</h2>
        <p style="color:#aaa; font-size:14px; text-align:center; padding:0 20px;">Gib deine PayPal-E-Mail oder dein Krypto-Wallet für die Gewinnauszahlung ein:</p>
        <input type="text" id="paypal-email" placeholder="PayPal E-Mail / Wallet Adresse" style="padding: 12px; width: 80%; border-radius:8px; border:none; margin-bottom:15px;"><br>
        <button style="padding:12px; background-color:var(--green-color); color:white; border:none; border-radius:8px; width:84%; font-weight:bold;" onclick="saveWallet()">Speichern & Auszahlen</button><br>
        <button style="padding:10px; margin:15px; background:none; border:none; color:#aaa;" onclick="closeMenus()">Schließen</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 100;
        let currentBet = 1;
        let currentProfit = 0;
        let currentStep = 0;
        let gameActive = false;

        // Versuche den echten Namen aus Telegram zu ziehen
        try {
            const telegramUser = tg.initDataUnsafe?.user?.username;
            if(telegramUser) {
                // Hier könnte man später den Namen dynamisch in die Tabelle eintragen
            }
        } catch(e) {}

        function openMenu(menuId) {
            closeMenus();
            document.getElementById(menuId + '-menu').style.display = 'flex';
        }

        function closeMenus() {
            document.querySelectorAll('.overlay-menu').forEach(m => m.style.display = 'none');
        }

        function setBet(amount) {
            if(!gameActive) {
                currentBet = amount;
                tg.HapticFeedback.impactOccurred("light");
            }
        }

        function startGame() {
            if(!gameActive) {
                if(balance < currentBet) {
                    alert("Nicht genug Münzen! Bitte im Shop aufladen.");
                    return;
                }
                balance -= currentBet;
                document.getElementById('user-balance').innerText = balance;
                gameActive = true;
                currentStep = 1;
                currentProfit = currentBet * 1.98;
                document.getElementById('win-amount').innerText = currentProfit.toFixed(2) + " USD";
            } else {
                currentStep++;
                let crashChance = Math.random();
                if (crashChance < 0.25) { 
                    alert("BOOM! Verloren!");
                    gameActive = false;
                    currentProfit = 0;
                    document.getElementById('win-amount').innerText = "0.00 USD";
                } else {
                    currentProfit += 0.05; 
                    document.getElementById('win-amount').innerText = currentProfit.toFixed(2) + " USD";
                }
            }
            tg.HapticFeedback.impactOccurred("medium");
        }

        function cashOut() {
            if(gameActive && currentProfit > 0) {
                alert("Erfolgreich ausgezahlt: " + currentProfit.toFixed(2) + " USD");
                gameActive = false;
                currentProfit = 0;
                document.getElementById('win-amount').innerText = "0.00 USD";
                tg.HapticFeedback.notificationOccurred("success");
            }
        }

        function setLanguage(lang) {
            alert("Sprache geändert auf: " + lang);
            closeMenus();
        }

        function buyCoins(amount, price) {
            alert("Du kaufst " + amount + " Münzen für " + price + "€.");
        }

        function saveWallet() {
            const val = document.getElementById('paypal-email').value;
            if(val) {
                alert("Adresse gespeichert: " + val);
                closeMenus();
            } else {
                alert("Bitte gib eine gültige Adresse ein.");
            }
        }
    </script>
</body>
</html>
