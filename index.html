<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Mines Spiel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a2332;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #8a99ad; font-size: 14px; margin-bottom: 20px; }
        
        /* Das 5x5 Raster */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-width: 350px;
            margin: 0 auto 20px auto;
        }
        
        /* Die einzelnen Felder */
        .cell {
            aspect-ratio: 1;
            background-color: #2c3e50;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: background 0.2s;
        }
        .cell:hover { background-color: #34495e; }
        
        /* Zustand der Felder nach dem Klicken */
        .cell.revealed-star { background-color: #00bcd4; } /* Blau für Stern */
        .cell.revealed-bomb { background-color: #e74c3c; } /* Rot für Bombe */
        
        button {
            background-color: #00b0ff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
        }
        button:hover { background-color: #0091ea; }
    </style>
</head>
<body>

    <h1>Mines TM</h1>
    <div class="subtitle">Mini-App</div>

    <!-- Das Spielfeld -->
    <div class="grid" id="grid"></div>

    <!-- Neustart-Button -->
    <button onclick="startGame()">Spiel starten / Reset</button>

    <script>
        // Telegram WebApp initialisieren
        const tg = window.Telegram.WebApp;
        tg.expand(); // Macht die App im Telegram-Fenster groß

        const gridContainer = document.getElementById('grid');
        const boardSize = 25; // 5x5 Raster
        const bombCount = 3;  // Anzahl der Bomben
        let bombPositions = [];
        let gameOver = false;

        function startGame() {
            gridContainer.innerHTML = '';
            bombPositions = [];
            gameOver = false;

            // 1. Bomben zufällig verteilen
            while(bombPositions.length < bombCount) {
                let randomPos = Math.floor(Math.random() * boardSize);
                if(!bombPositions.includes(randomPos)) {
                    bombPositions.push(randomPos);
                }
            }

            // 2. Das Spielfeld im HTML aufbauen
            for (let i = 0; i < boardSize; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                
                // Klick-Event für jedes Feld
                cell.addEventListener('click', () => clickCell(cell, i));
                
                gridContainer.appendChild(cell);
            }
        }

        function clickCell(cell, index) {
            if (gameOver || cell.classList.contains('revealed-star')) return;

            // Wenn eine Bombe getroffen wurde
            if (bombPositions.includes(index)) {
                cell.classList.add('revealed-bomb');
                cell.innerText = '💣';
                gameOver = true;
                alert('BOOM! Du hast eine Mine getroffen. 💥');
                revealAll();
            } else {
                // Wenn es ein sicheres Feld (Stern) war
                cell.classList.add('revealed-star');
                cell.innerText = '💎';
            }
        }

        // Zeigt am Ende alle Bomben anfunction revealAll() {
            const cells = document.querySelectorAll('.cell');
            bombPositions.forEach(pos => {
                cells[pos].classList.add('revealed-bomb');
                cells[pos].innerText = '💣';
            });
        }

        // Direkt beim Laden starten
        startGame();
    </script>
</body>
</html>
