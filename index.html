<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Präzise Edition</title>
    <style>
        :root {
            --bg-dark: #0f0b1e;
            --panel-bg: #1c153a;
            --btn-green: #00cd52;
            --btn-green-hover: #00e65c;
            --btn-purple: #6a1b9a;
            --text-light: #ffffff;
            --text-muted: #8b85b1;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 430px;
            height: 95vh;
            background-color: #130e2b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            position: relative;
        }

        /* --- NAVIGATION OBERHALB --- */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #1a1336;
            border-bottom: 1px solid #2d2356;
            z-index: 30;
        }
        .nav-buttons {
            display: flex;
            gap: 8px;
        }
        .nav-btn {
            background: #271e4f;
            border: 1px solid #3c326d;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* --- SPIELFELD --- */
        .game-view {
            flex: 1;
            position: relative;
            background-color: #555; 
            overflow: hidden;
            display: flex;
        }

        .farm-side {
            width: 100px;
            background: #2e7d32; 
            position: relative;
            border-right: 4px solid #5d4037;
            z-index: 5;
            flex-shrink: 0;
        }

        /* Das Huhn - Langsame, geschmeidige Bewegung eingebaut (0.8 Sekunden) */
        .chicken {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.3rem;
            z-index: 10;
            transition: left 0.8s ease-in-out, top 0.8s ease-in-out; 
            pointer-events: none;
        }

        .road-side {
            flex: 1;
            position: relative;
            background: #3e3e3e;
            display: flex;
            align-items: center;
            overflow-x: auto;
            scroll-behavior: smooth;
        }
        .road-side::-webkit-scrollbar { display: none; }

        .road-container-scroll {
            display: flex;
            align-items: center;
            padding-left: 40px;
            padding-right: 250px;
            height: 100%;
            position: relative;
        }

        .lane-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 0;
            border-left: 3px dashed rgba(255,255,255,0.3);
        }

        /* Kacheln (Gullydeckel) */
        .gully-tile {
            width: 75px;
            height: 75px;
            background: radial-gradient(circle, #424242 0%, #212121 100%);
            border: 4px solid #111;
            border-radius: 50%;
            margin-right: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: #aaa;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            position: relative;
            z-index: 6;
            flex-shrink: 0;
            transition: border-color 0.3s;
        }
        .gully-tile.active-step {
            border-color: var(--gold);
            box-shadow: 0 0 12px var(--gold);
        }

        /* Verwandlung in Goldmünze */
        .gully-tile.safe-coin {
            background: radial-gradient(circle, #ffee55 0%, #fbc02d 100%);
            border-color: #fff;
        }
        .gully-tile.safe-coin::after {
            content: '🪙';
            font-size: 2.4rem;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Autos fahren jetzt absolut schnurgerade von oben nach unten herunter */
        .car-obstacle {
            position: absolute;
            font-size: 2.6rem;
            z-index: 12;
            top: -60px;
            transition: top 1.8s linear; /* Gleichmäßige, gerade Fahrt nach unten */
        }

        /* --- CONTROL PANEL --- */
        .control-panel {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 2px solid #2d2356;
        }

        .action-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
        }
        .btn-green-main { background-color: var(--btn-green); color: #000; }
        .btn-green-main:hover { background-color: var(--btn-green-hover); }
        .btn-green-main:disabled { background: #335c43; color: #777; cursor: not-allowed; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            background: var(--bg-dark);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #3c326d;
        }
        .stat-val { font-weight: bold; color: var(--gold); }

        .tab-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--bg-dark);
            padding: 4px;
            border-radius: 30px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
        }
        .tab-btn.active {
            background-color: var(--btn-purple);
            color: #fff;
        }

        .overlay-screen {
            position: absolute;
            top: 55px; left: 0; right: 0; bottom: 0;
            background: rgba(15, 11, 30, 0.95);
            z-index: 100;
            padding: 20px;
            display: none;
            flex-direction: column;
        }
        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3c326d;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .close-btn { background: none; border: none; color: #ff3333; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- HEADER INTERFACE -->
        <div class="top-nav">
            <div style="font-weight: bold; display: flex; align-items: center; gap: 5px;">
                <span>🪙</span> <span id="balance-coins">200</span> Test-Münzen
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="openOverlay('shop-overlay')">🛒 Gratis Shop</button>
                <button class="nav-btn" onclick="openOverlay('settings-overlay')">⚙️ Menü</button>
            </div>
        </div>

        <!-- AREA DER STRASSE -->
        <div class="game-view">
            <div class="farm-side">
                <div class="chicken" id="player-chicken"> Rooster 🐓 </div>
            </div>
            <div class="road-side" id="road-scroller">
                <div class="road-container-scroll" id="tiles-container"></div>
            </div>
        </div>

        <!-- BEDIEUNUNGSPANEL -->
        <div class="control-panel">
            <div class="stats-bar">
                <div>Kosten: <span class="stat-val">10 Münzen</span></div>
                <div>Lauf-Gewinn: <span class="stat-val" id="display-win">0.00</span> €</div>
            </div>

            <div id="action-area">
                <button id="btn-action" class="action-button btn-green-main" onclick="startRound()">Runde starten</button>
            </div>

            <div class="tab-group">
                <button id="mode-manual" class="tab-btn active" onclick="setMode('manual')">Manuell</button>
                <button id="mode-auto" class="tab-btn" onclick="setMode('auto')">Auto-Modus</button>
            </div>
        </div>

        <!-- POPUPS -->
        <div id="shop-overlay" class="overlay-screen">
            <div class="overlay-header">
                <h3>🛒 Gratis Münzen (0 € Modus)</h3>
                <button class="close-btn" onclick="closeOverlays()">×</button>
            </div>
            <p>Es wird kein Echtgeld benötigt. Alles ist komplett kostenfrei eingestellt!</p>
            <button class="action-button btn-green-main" onclick="freeRefill()" style="margin-top: 20px;">+100 Münzen gratis aufladen</button>
        </div>

        <div id="settings-overlay" class="overlay-screen">
            <div class="overlay-header">
                <h3>⚙️ Einstellungen</h3>
                <button class="close-btn" onclick="closeOverlays()">×</button>
            </div>
            <p><strong>Sprache:</strong> Deutsch</p>
            <p><strong>Support:</strong> Aktiviert</p>
        </div>

    </div>

    <script>
        let coins = 200;
        let gameMode = 'manual'; 
        let isGameRunning = false;
        let currentStep = 0;
        let maxSteps = 10;
        let earnedMoney = 0.00;
        let betCostInCoins = 10; 
        let minePositions = [];
        let autoTimer = null;
        let isMoving = false; // Blockiert Klicks während das Huhn läuft

        const multipliers = [1.05, 1.15, 1.25, 1.40, 1.60, 1.90, 2.30, 2.80, 3.50, 5.00];

        const chicken = document.getElementById('player-chicken');
        const scroller = document.getElementById('road-scroller');
        const tilesContainer = document.getElementById('tiles-container');
        const balanceCoinsDisplay = document.getElementById('balance-coins');
        const displayWin = document.getElementById('display-win');

        function generateRoad() {
            tilesContainer.innerHTML = '';
            for(let i = 1; i <= 6; i++) {
                const line = document.createElement('div');
                line.className = 'lane-line';
                line.style.left = `${i * 120}px`;
                tilesContainer.appendChild(line);
            }
            for (let i = 0; i < maxSteps; i++) {
                const gully = document.createElement('div');
                gully.className = 'gully-tile';
                gully.id = `step-${i}`;
                gully.innerHTML = `<span>${multipliers[i]}×</span>`;
                tilesContainer.appendChild(gully);
            }
        }

        function setMode(mode) {
            if (isGameRunning) return;
            gameMode = mode;
            document.getElementById('mode-manual').classList.toggle('active', mode === 'manual');
            document.getElementById('mode-auto').classList.toggle('active', mode === 'auto');
        }

        function openOverlay(id) { closeOverlays(); document.getElementById(id).style.display = 'flex'; }
        function closeOverlays() { document.getElementById('shop-overlay').style.display = 'none'; document.getElementById('settings-overlay').style.display = 'none'; }

        function freeRefill() {
            coins += 100;
            balanceCoinsDisplay.innerText = coins;
            closeOverlays();
        }

        function startRound() {
            if (coins < betCostInCoins) {
                alert("Keine Münzen! Lade im Gratis-Shop nach.");
                openOverlay('shop-overlay');
                return;
            }

            coins -= betCostInCoins;
            balanceCoinsDisplay.innerText = coins;
            isGameRunning = true;
            isMoving = false;
            currentStep = 0;
            earnedMoney = 0.00;
            displayWin.innerText = "0.00";

            // Hindernis-Verteilung
            minePositions = Array(maxSteps).fill(false);
            let randomDanger = Math.floor(Math.random() * 5) + 2; 
            minePositions[randomDanger] = true;

            generateRoad();
            chicken.style.left = '30px'; 
            chicken.style.top = '50%';
            scroller.scrollLeft = 0;

            if (gameMode === 'manual') {
                prepareJumpButton();
            } else {
                startAutoModeLoop();
            }
        }

        function prepareJumpButton() {
            document.getElementById('action-area').innerHTML = `
                <button id="btn-action" class="action-button btn-green-main" onclick="executeStep()">Springen 🐓</button>
            `;
            highlightStep();
        }

        function highlightStep() {
            document.querySelectorAll('.gully-tile').forEach((el, index) => {
                el.classList.toggle('active-step', index === currentStep);
            });
        }

        function executeStep() {
            if (!isGameRunning || isMoving) return;

            isMoving = true; // Verhindert Spamming während der langsamen Bewegung
            const targetGully = document.getElementById(`step-${currentStep}`);
            
            // Mathematisch exakte Zentrierung auf dem Münz-Gully
            const containerLeft = tilesContainer.getBoundingClientRect().left;
            const gullyLeft = targetGully.getBoundingClientRect().left;
            const targetX = (gullyLeft - containerLeft) + (targetGully.offsetWidth / 2) - (chicken.offsetWidth / 2);
            
            // Huhn läuft los
            chicken.style.left = `${targetX}px`;

            // Warten bis das Huhn die langsame Bewegung (0.8s) beendet hat
            setTimeout(() => {
                if (minePositions[currentStep]) {
                    isGameRunning = false;
                    if (autoTimer) clearInterval(autoTimer);

                    // Auto kommt exakt schnurgerade von oben nach unten gefahren
                    const car = document.createElement('div');
                    car.className = 'car-obstacle';
                    car.innerText = '🚘';
                    car.style.left = `${targetGully.offsetLeft + (targetGully.offsetWidth / 2) - 20}px`;
                    tilesContainer.appendChild(car);

                    setTimeout(() => { car.style.top = '35%'; }, 50);

                    setTimeout(() => {
                        alert("💥 Crash! Ein Auto kam von oben.");
                        resetToStart();
                    }, 1500);

                } else {
                    // Punktlandung auf der Münze vollendet
                    targetGully.classList.remove('active-step');
                    targetGully.classList.add('safe-coin');

                    earnedMoney += 0.50;
                    displayWin.innerText = earnedMoney.toFixed(2);

                    currentStep++;
                    isMoving = false;

                    if (currentStep > 1) scroller.scrollLeft += 120;

                    if (currentStep >= maxSteps) {
                        isGameRunning = false;
                        if (autoTimer) clearInterval(autoTimer);
                        alert(`🎉 Gewonnen! Du hast ${earnedMoney.toFixed(2)} € erreicht!`);
                        resetToStart();
                    } else {
                        if (gameMode === 'manual') {
                            highlightStep();
                            document.getElementById('action-area').innerHTML = `
                                <button class="action-button btn-green-main" onclick="executeStep()" style="margin-bottom:5px;">Weiter Springen</button>
                                <button class="action-button" onclick="cashOutEarly()" style="background:#d32f2f;">Sichern (${earnedMoney.toFixed(2)}€)</button>
                            `;
                        }
                    }
                }
            }, 800); // Entspricht exakt der Animationsdauer des Huhns
        }

        function startAutoModeLoop() {
            document.getElementById('action-area').innerHTML = `
                <button id="btn-action" class="action-button" style="background:#555;" disabled>Auto-Modus läuft...</button>
            `;
            
            autoTimer = setInterval(() => {
                if (!isGameRunning) {
                    clearInterval(autoTimer);
                    return;
                }
                
                if (!isMoving) {
                    executeStep();
                }

                // Auto-Modus stoppt manchmal strategisch um abzuheben
                if (isGameRunning && currentStep >= 4 && Math.random() > 0.75) {
                    clearInterval(autoTimer);
                    cashOutEarly();
                }
            }, 2200); // Genug Zeitfenster für den langsamen Sprung + Pause
        }

        function cashOutEarly() {
            isGameRunning = false;
            if (autoTimer) clearInterval(autoTimer);
            alert(`Gesichert! Du beendest die Runde mit ${earnedMoney.toFixed(2)} €.`);
            resetToStart();
        }

        function resetToStart() {
            isGameRunning = false;
            isMoving = false;
            if (autoTimer) clearInterval(autoTimer);
            document.getElementById('action-area').innerHTML = `
                <button id="btn-action" class="action-button btn-green-main" onclick="startRound()">Runde starten</button>
            `;
            generateRoad();
        }

        generateRoad();
    </script>
</body>
</html>
