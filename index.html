<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Kacheln Original</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f172a;
            font-family: 'Arial', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #balance { color: #4ade80; }
        #multiplier-box {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #facc15;
            margin: 15px 0;
        }

        /* Das Spielfeld - Von unten nach oben */
        #grid {
            display: flex;
            flex-direction: column-reverse; /* Damit Reihe 1 unten ist */
            gap: 8px;
            background: #334155;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 8px;
            opacity: 0.4; /* Inaktive Reihen sind ausgegraut */
            pointer-events: none;
        }

        .row.active {
            opacity: 1;
            pointer-events: auto;
        }

        .row.completed {
            opacity: 0.7;
            pointer-events: none;
        }

        .tile {
            flex: 1;
            height: 50px;
            background: #475569;
            border: 2px solid #64748b;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: background 0.2s, transform 0.1s;
        }

        .row.active .tile:hover {
            background: #64748b;
            transform: scale(1.02);
        }

        /* Zustand der Kacheln */
        .tile.safe { background: #16a34a !important; border-color: #4ade80; }
        .tile.mine { background: #dc2626 !important; border-color: #f87171; }

        /* Steuerung */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: space-between;
            align-items: center;
        }

        input {
            width: 100px;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #start-btn { background: #3b82f6; color: white; }
        #start-btn:hover { background: #2563eb; }
        
        #cashout-btn { background: #10b981; color: white; display: none; }
        #cashout-btn:hover { background: #059669; }

        #status {
            text-align: center;
            font-weight: bold;
            height: 20px;
            margin-top: 10px;
        }
    </style>
</head
