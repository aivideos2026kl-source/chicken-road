<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Road - Amiry Games Replica</title>
    <style>
        :root {
            --bg-dark: #0f0b1e;
            --panel-bg: #1c153a;
            --btn-green: #00cd52;
            --btn-green-hover: #00e65c;
            --btn-purple: #6a1b9a;
            --text-light: #ffffff;
            --text-muted: #8b85b1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Arial', sans-serif;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        /* Haupt-App-Container (Hochformat wie auf dem Smartphone) */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 92vh;
            background-color: #130e2b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* --- SPIELFELD (OBEN) --- */
        .game-view {
            flex: 1;
            position: relative;
            background-color: #726d7c; /* Asphalt-Farbe */
            overflow: hidden;
            display: flex;
        }

        /* Linke Seite: Die Farm (Maisfeld & Wasserturm) */
        .farm-side {
            width: 140px;
            background: #2e7d32; /* Grünes Gras */
            position: relative;
            border-right: 4px solid #5d4037; /* Zaun/Erde-Linie */
            z-index: 5;
            flex-shrink: 0;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }

        /* Pixel-Grafiken simuliert mit CSS */
        .field-corn {
            height: 60%;
            background: repeating-linear-gradient(45deg, #fbc02d, #fbc02d 10px, #f57f17 10px, #f57f17 20px);
            border-bottom: 8px solid #4caf50;
        }

        .water-tower {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 45px;
            height: 55px;
            background: #ffb74d;
            border-radius: 8px 8px 0 0;
            border: 3px solid #e65100;
        }
        .water-tower::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 10px;
            width: 20px;
            height: 20px;
            border-left: 4px solid #e65100;
            border-right: 4px solid #e65100;
        }

        /* Das Huhn */
        .chicken {
            position: absolute;
            left: 95px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.2rem;
            z-index: 10;
            transition: left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Rechte Seite: Die Straße mit Fahrbahnen */
        .road-side {
            flex: 1;
            position: relative;
            background: #616161;
            display: flex;
            align-items: center;
            overflow-x: auto;
            scroll-behavior: smooth;
        }
        /* Ausblenden der Scrollbar */
        .road-side::-webkit-scrollbar { display: none; }

        .road-container-scroll {
            display: flex;
            align-items: center;
            padding-left: 20px;
            padding-right: 200px;
            height: 100%;
            position: relative;
        }

        /* Gestrichelte Fahrbahnmarkierungen */
        .lane-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 0;
            border-left: 3px dashed rgba(255,255,255,0.4);
        }

        /* Gullydeckel (Die Kacheln / Stufen) */
        .gully-tile {
            width: 65px;
            height: 65px;
            background: radial-gradient(circle, #424242 0%, #212121 100%);
            border: 4px solid #111;
            border-radius: 50%;
            margin-right: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #aaa;
            box-shadow: inset 0 0 10px #000, 0 4px 6px rgba(0,0,0,0.4);
            cursor: pointer;
            position: relative;
            z-index: 6;
            flex-shrink: 0;
            transition: transform 0.1s;
        }
        .gully-tile.active-step {
            border-color: #9e9e9e;
            color: #fff;
        }

        /* Zustände der Gullydeckel */
        .gully-tile.safe-cone {
            background: #7986cb; /* Platzhalter für Hütchen-Hintergrund */
            border-color: #3f51b5;
        }
        .gully-tile.safe-cone::after {
            content: '📐'; /* Leitkegel-Emoji */
            font-size: 1.8rem;
            position: absolute;
        }
        
        .gully-tile.safe-coin {
            background: #fff176;
            border-color: #fbc02d;
        }
        .gully-tile.safe-coin::after {
            content: '🪙';
            font-size: 1.8rem;
            position: absolute;
        }

        /* Hindernis-Autos */
        .car-obstacle {
            position: absolute;
            font-size: 2.5rem;
            z-index: 12;
            transform: rotate(-90deg); /* Auto fährt nach oben */
            transition: top 0.4s ease-in;
        }

        /* Kopf-Anzeigen auf dem Spielfeld */
        .top-overlay-stats {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 20;
            pointer-events: none;
        }

        .balance-badge {
            background: rgba(28, 21, 58, 0.85);
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid #3c326d;
        }

        .history-multipliers {
            display: flex;
            gap: 6px;
        }
        .multi-badge {
            background: var(--btn-green);
            color: #000;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 15px;
        }


        /* --- STEUERUNGSPANEL (UNTEN) --- */
        .control-panel {
            background-color: var(--panel-bg);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-top: 2px solid #2d2356;
        }

        /* Grüne Haupt-Aktionsknöpfe */
        .action-button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: background 0.1s;
        }
        .btn-green-main { background-color: var(--btn-green); color: #000; }
        .btn-green-main:hover { background-color: var(--btn-green-hover); }
        .btn-green-main:disabled { background-color: #17532d; color: #666; cursor: not-allowed; }

        /* Einsatz-Eingabe Zeile */
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-wrapper {
            display: flex;
            background-color: var(--bg-dark);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #3c326d;
        }
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            outline: none;
        }
        .currency-label {
            display: flex;
            align-items: center;
            padding-right: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #fff;
        }

        .shortcut-group {
            display: flex;
            border-left: 1px solid #3c326d;
        }
        .shortcut-btn {
            background: #271e4f;
            border: none;
            color: #fff;
            padding: 0 15px;
            font-weight: bold;
            cursor: pointer;
            border-left: 1px solid #3c326d;
        }
        .shortcut-btn:hover { background: #35296a; }

        /* Risiko Dropdown */
        .dropdown-select {
            background-color: var(--bg-dark);
            border: 1px solid #3c326d;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* Manuell / Auto Tabs unten */
        .tab-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--bg-dark);
            padding: 4px;
            border-radius: 30px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .tab-btn.active {
            background-color: var(--btn-purple);
            color: #fff;
        }

        #status-info {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: -5px;
            min-height: 16px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- VISUELLES SPIELFELD -->
        <div class="game-view">
            <!-- Anzeigen oben drüber -->
            <div class="top-overlay-stats">
                <div class="balance-badge"><span id="user-balance">10.006,04</span> EUR</div>
                <div class="history-multipliers">
                    <div class="multi-badge">3.53×</div>
                    <div class="multi-badge">1.45×</div>
                    <div class="multi-badge">1.03×</div>
                </div>
            </div>

            <!-- Linker Farm-Bereich -->
            <div class="farm-side">
                <div class="field-corn"></div>
                <div class="water-tower"></div>
                <!-- Das Huhn -->
                <div class="chicken" id="player-chicken">🐓</div>
            </div>

            <!-- Rechter Straßen-Bereich (Horizontal scrollbar) -->
            <div class="road-side" id="road-scroller">
                <div class="road-container-scroll" id="tiles-container">
                    <!-- Fahrbahnlinien & Gullydeckel werden per JS erzeugt -->
                </div>
            </div>
        </div>

        <!-- STEUERUNGSPANEL UNTEN -->
        <div class="control-panel">
            
            <!-- Dynamische Aktions-Buttons -->
            <div id="buttons-area">
                <button id="btn-main-action" class="action-button btn-green-main" onclick="startBet()">Einsatz</button>
            </div>

            <div id="status-info">Bereit für den Start. Platziere deinen Einsatz!</div>

            <!-- Einsatzbetrag -->
            <div class="form-row">
                <div class="form-label">Einsatzbetrag</div>
                <div class="input-wrapper">
                    <input type="number" id="bet-input" value="2.00" step="0.5" min="0.1">
                    <div class="currency-label">EUR</div>
                    <div class="shortcut-group">
                        <button class="shortcut-btn" onclick="modifyBet(0.5)">½</button>
                        <button class="shortcut-btn" onclick="modifyBet(2)">2x</button>
                    </div>
                </div>
            </div>

            <!-- Risiko -->
            <div class="form-row">
                <div class="form-label">Risiko</div>
                <select class="dropdown-select">
                    <option>Niedrig</option>
                    <option>Mittel</option>
                    <option>Hoch</option>
                </select>
            </div>

            <!-- Modus (Manuell / Auto) -->
            <div class="tab-group">
                <button class="tab-btn active">Manuell</button>
                <button class="tab-btn">Auto</button>
            </div>

        </div>
    </div>

    <script>
        let balance = 10006.04;
        let currentBet = 2.00;
        let currentStep = 0;
        let maxSteps = 10;
        let isGameRunning = false;
        
        // Multiplikatoren exakt wie aus deinen Bildern abgelesen
        const multipliers = [1.03, 1.07, 1.12, 1.17, 1.23, 1.30, 1.37, 1.45, 1.54, 1.65];
        let minePositions = []; // Speichert, ob auf einer Stufe ein Crash passiert

        const chicken = document.getElementById('player-chicken');
        const scroller = document.getElementById('road-scroller');
        const tilesContainer = document.getElementById('tiles-container');
        const balanceDisplay = document.getElementById('user-balance');
        const betInput = document.getElementById('bet-input');
        const buttonsArea = document.getElementById('buttons-area');
        const statusInfo = document.getElementById('status-info');

        // Initialisiert die Gullydeckel auf der Straße
        function generateRoad() {
            tilesContainer.innerHTML = '';
            
            // Fahrbahnstreifen hinzufügen
            for(let i = 1; i <= 4; i++) {
                const line = document.createElement('div');
                line.className = 'lane-line';
                line.style.left = `${i * 90}px`;
                tilesContainer.appendChild(line);
            }

            // Gully-Kacheln generieren
            for (let i = 0; i < maxSteps; i++) {
                const gully = document.createElement('div');
                gully.className = 'gully-tile';
                gully.id = `step-${i}`;
                gully.innerHTML = `<span>${multipliers[i]}×</span>`;
                tilesContainer.appendChild(gully);
            }
        }

        function modifyBet(factor) {
            if (isGameRunning) return;
            let current = parseFloat(betInput.value);
            betInput.value = (current * factor).toFixed(2);
        }

        function startBet() {
            let betValue = parseFloat(betInput.value);
            if (isNaN(betValue) || betValue > balance || betValue <= 0) {
                statusInfo.innerText = "Ungültiger Kontostand oder Einsatz!";
                return;
            }

            // Spiel initialisieren
            balance -= betValue;
            currentBet = betValue;
            currentStep = 0;
            isGameRunning = true;
            
            // Minen-Logik festlegen (z.B. Schritt 3 ist diesmal eine Mine)
            minePositions = Array(maxSteps).fill(false);
            let randomCrashSite = Math.floor(Math.random() * (maxSteps - 1)) + 1; 
            minePositions[randomCrashSite] = true;

            // UI zurücksetzen
            balanceDisplay.innerText = balance.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            generateRoad();
            chicken.style.left = '95px';
            scroller.scrollLeft = 0;

            highlightActiveGully();
            switchToGameButtons();
            statusInfo.innerText = "Spiel läuft! Drücke 'Springen' für den ersten Schritt.";
        }

        function highlightActiveGully() {
            // Alle Deckel zurücksetzen, aktuellen hervorheben
            document.querySelectorAll('.gully-tile').forEach((el, index) => {
                if (index === currentStep) {
                    el.classList.add('active-step');
                } else {
                    el.classList.remove('active-step');
                }
            });
        }

        function switchToGameButtons() {
            // Tauscht den "Einsatz"-Button gegen "Springen" und "Abheben" aus (wie im Screenshot)
            buttonsArea.innerHTML = `
                <button id="btn-jump" class="action-button btn-green-main" onclick="makeJump()" style="margin-bottom: 8px;">Springen</button>
                <button id="btn-cashout" class="action-button btn-green-main" onclick="cashOut()" style="background-color: #00cd52;">Abheben</button>
            `;
            updateCashoutButtonText();
        }

        function updateCashoutButtonText() {
            const cashoutBtn = document.getElementById('btn-cashout');
            if (!cashoutBtn) return;
            
            if (currentStep === 0) {
                cashoutBtn.innerText = "Abheben";
                cashoutBtn.disabled = true;
                cashoutBtn.style.opacity = "0.5";
            } else {
                let currentWin = currentBet * multipliers[currentStep - 1];
                cashoutBtn.innerText = `Abheben (${currentWin.toFixed(2)} EUR)`;
                cashoutBtn.disabled = false;
                cashoutBtn.style.opacity = "1";
            }
        }

        function makeJump() {
            if (!isGameRunning) return;

            const targetGully = document.getElementById(`step-${currentStep}`);
            
            if (minePositions[currentStep]) {
                // --- CRASH / AUTO ERWISCHT DAS HUHN ---
                isGameRunning = false;
                statusInfo.innerHTML = "<span style='color: #ff3333;'>CRASH! Ein Auto hat das Huhn erwischt!</span>";
                
                // Auto-Hindernis visuell einfliegen lassen
                const car = document.createElement('div');
                car.className = 'car-obstacle';
                car.innerText = Math.random() > 0.5 ? '🚓' : '🚕';
                car.style.left = `${targetGully.offsetLeft + 10}px`;
                car.style.top = '-50px';
                tilesContainer.appendChild(car);
                
                setTimeout(() => { car.style.top = '40%'; }, 50);

                // Zurück zum Start-Button
                setTimeout(resetToBetButton, 1500);
            } else {
                // --- ERFOLGREICHER SPRUNG ---
                // Huhn visuell auf den Gullydeckel bewegen
                chicken.style.left = `${targetGully.offsetLeft + 20}px`;
                
                // Gullydeckel optisch verändern (Zufällig Hütchen oder Münze wie auf den Bildern)
                if (currentStep % 2 === 0) {
                    targetGully.classList.add('safe-cone');
                } else {
                    targetGully.classList.add('safe-coin');
                }

                currentStep++;
                
                // Kamera scrollt automatisch mit dem Huhn mit
                if (currentStep > 2) {
                    scroller.scrollLeft += 90;
                }

                if (currentStep >= maxSteps) {
                    // Ende erreicht
                    statusInfo.innerHTML = "<span style='color: #00cd52;'>Maximaler Erfolg! Straße überquert!</span>";
                    cashOut();
                } else {
                    highlightActiveGully();
                    updateCashoutButtonText();
                    statusInfo.innerText = "Sicher gelandet! Nächster Sprung oder Auszahlen?";
                }
            }
        }

        function cashOut() {
            if (!isGameRunning || currentStep === 0) return;

            isGameRunning = false;
            let winMultiplier = multipliers[currentStep - 1];
            let totalWin = currentBet * winMultiplier;
            balance += totalWin;

            balanceDisplay.innerText = balance.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            statusInfo.innerHTML = `<span style='color: #00cd52;'>Erfolgreich! +${totalWin.toFixed(2)} EUR ausgezahlt.</span>`;
            
            resetToBetButton();
        }

        function resetToBetButton() {
            isGameRunning = false;
            buttonsArea.innerHTML = `<button id="btn-main-action" class="action-button btn-green-main" onclick="startBet()">Einsatz</button>`;
            // Eventuelle Autos löschen
            document.querySelectorAll('.car-obstacle').forEach(c => c.remove());
        }

        // Beim Laden direkt die leere Straße zeichnen
        generateRoad();
    </script>
</body>
</html>
