    <!-- HIER STARTET JETZT DAS JAVASCRIPT KORREKT IM BROWSER -->
    <script>
        const tg = window.Telegram.WebApp;
        if (tg) tg.expand();

        // CONFIGURATION
        const SECRET_SALT = "MEIN_SUPER_GEHEIMES_WORT_123"; 
        const ADMIN_USERNAME = "modaviva2026"; // Dein Telegram-Username ohne @

        let coins = parseInt(localStorage.getItem('m_coins')) || 0;
        let euros = parseFloat(localStorage.getItem('m_euros')) || 0.00;
        let selectedChoice = null;
        let isFlipsRunning = false;

        function updateUI() {
            document.querySelectorAll('.coin-display').forEach(el => el.innerText = coins);
            document.querySelectorAll('.euro-display').forEach(el => el.innerText = euros.toFixed(2));
            localStorage.setItem('m_coins', coins);
            localStorage.setItem('m_euros', euros);
        }

        function selectChoice(choice) {
            if (isFlipsRunning) return;
            selectedChoice = choice;
            document.getElementById('btn-head').classList.remove('active');
            document.getElementById('btn-tail').classList.remove('active');
            if (choice === 'Kopf') document.getElementById('btn-head').classList.add('active');
            if (choice === 'Zahl') document.getElementById('btn-tail').classList.add('active');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('section-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        function flipCoin() {
            if (coins < 1 || selectedChoice === null || isFlipsRunning) return;
            isFlipsRunning = true;
            coins--;
            updateUI();
            
            const coinElement = document.getElementById('coin-element');
            
            // Animation zurücksetzen, damit sie JEDES MAL neu startet
            coinElement.style.transition = 'none';
            coinElement.className = 'coin';
            
            // Optischer Zufall (50/50 Chance was die Münze anzeigt)
            const coinResult = Math.random() < 0.5 ? 'Kopf' : 'Zahl';
            
            setTimeout(() => {
                coinElement.style.transition = 'transform 1.5s ease-out';
                if (coinResult === 'Kopf') coinElement.classList.add('animate-head');
                else coinElement.classList.add('animate-tail');
            }, 50);
            
            setTimeout(() => {
                isFlipsRunning = false;
                
                // HIER WIRD DIE GEWINNCHANCE GESTEUERT:
                // Math.random() < 0.15 bedeutet: Nur 15% echte Gewinnchance beim richtigen Tipp!
                // Wenn du es noch schwerer haben willst, ändere 0.15 auf 0.05 (5%)
                const userHasLuck = Math.random() < 0.15; 
                
                if (selectedChoice === coinResult && userHasLuck) {
                    euros += 2.00;
                    if (tg && tg.showAlert) tg.showAlert(`🎉 Richtig! Münze zeigt ${coinResult}. Du gewinnst 2.00 €!`);
                    else alert(`🎉 Richtig! Münze zeigt ${coinResult}. Du gewinnst 2.00 €!`);
                } else {
                    if (tg && tg.showAlert) tg.showAlert(`❌ Leider kein Gewinn! Die Münze zeigt ${coinResult}.`);
                    else alert(`❌ Leider kein Gewinn! Die Münze zeigt ${coinResult}.`);
                }
                updateUI();
            }, 1550);
        }

        // GENERATOR LOGIK FÜR DICH ALS ADMIN
        function checkAdminStatus() {
            let userParam = "unknown";
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userParam = tg.initDataUnsafe.user.username || "unknown";
            }
            if (userParam.toLowerCase() === ADMIN_USERNAME.toLowerCase()) {
                document.getElementById('admin-box').style.display = 'block';
                generateAdminCodes();
            }
        }

        function generateAdminCodes() {
            const buyerId = parseInt(document.getElementById('buyer-id-input').value) || 1;
            const todayStr = new Date().toISOString().slice(0, 10);
            
            const packages = [5, 10, 20, 50, 100];
            let html = "";
            
            packages.forEach(pkg => {
                const rawStr = `COINFLIP-${pkg}-${buyerId}-${todayStr}-${SECRET_SALT}`;
                let hash = 0;
                for (let i = 0; i < rawStr.length; i++) {
                    hash = (hash << 5) - hash + rawStr.charCodeAt(i);
                    hash |= 0;
                }
                const hexCode = Math.abs(hash).toString(16).toUpperCase().slice(0, 6);
                const finalCode = `T${pkg}-${buyerId}-${hexCode}`;
                
                html += `<li>• ${pkg} Münzen: <span class="admin-code-text">${finalCode}</span></li>`;
            });
            document.getElementById('admin-codes-list').innerHTML = html;
        }

        function redeemDynamicCode() {
            const inputCode = document.getElementById('coupon-code').value.trim().toUpperCase();
            if (!inputCode) return;
            
            const parts = inputCode.split('-');
            if (parts.length !== 3) {
                showRedeemResult(false, "Falsches Code-Format!");
                return;
            }
            
            const pkgPart = parts[0]; 
            const buyerId = parts[1];
            const originalHex = parts[2];
            
            if (!pkgPart.startsWith('T')) {
                showRedeemResult(false, "Ungültiger Code!");
                return;
            }
            
            const coinsToAdd = parseInt(pkgPart.substring(1));
            const todayStr = new Date().toISOString().slice(0, 10);
            
            const usedCodesKey = `used_codes_${todayStr}`;
            let usedCodes = JSON.parse(localStorage.getItem(usedCodesKey)) || [];
            
            if (usedCodes.includes(inputCode)) {
                showRedeemResult(false, "Dieser Code wurde heute bereits eingelöst!");
                return;
            }
            
            const checkRaw = `COINFLIP-${coinsToAdd}-${buyerId}-${todayStr}-${SECRET_SALT}`;
            let hash = 0;
            for (let i = 0; i < checkRaw.length; i++) {
                hash = (hash << 5) - hash + checkRaw.charCodeAt(i);
                hash |= 0;
            }
            const expectedHex = Math.abs(hash).toString(16).toUpperCase().slice(0, 6);
            
            if (originalHex === expectedHex) {
                coins += coinsToAdd;
                usedCodes.push(inputCode);
                localStorage.setItem(usedCodesKey, JSON.stringify(usedCodes));
                updateUI();
                document.getElementById('coupon-code').value = "";
                showRedeemResult(true, `Erfolgreich! +${coinsToAdd} Münzen aufgeladen.`);
            } else {
                showRedeemResult(false, "Code ist ungültiger oder abgelaufen!");
            }
        }

        function showRedeemResult(success, msg) {
            if (tg && tg.showAlert) tg.showAlert(msg);
            else alert(msg);
        }

        // Starten beim Laden
        window.onload = function() {
            updateUI();
            checkAdminStatus();
        };
    </script>
</body>
</html>
