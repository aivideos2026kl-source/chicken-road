<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Coin Flip Royale</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #111424;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        .balance-card {
            background: #1b203a;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .balance-title { color: #8a94a6; font-size: 14px; text-transform: uppercase; }
        .balance-amount { font-size: 28px; font-weight: bold; color: #ffcc00; margin-top: 5px; }
        
        .coin-visual {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: transform 0.6s ease-in-out;
        }
        .flip-animation { transform: rotateY(1440deg); }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-choice {
            background: #242b4d;
            border: 2px solid #3b4675;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        .btn-choice.active {
            border-color: #0088cc;
            background: #0088cc;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        .input-group input {
            background: #1b203a;
            border: 1px solid #3b4675;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 80px;
            text-align: center;
            font-size: 16px;
        }

        .btn-main {
            background: linear-gradient(135deg, #0088cc, #006699);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
        }
        .btn-buy {
            background: #27ae60;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- Kontostand -->
    <div class="balance-card">
        <div class="balance-title">Dein Guthaben</div>
        <div class="balance-amount"><span id="balance">0</span> 🪙</div>
        <button class="btn-main btn-buy" id="buy-coins-btn">🛒 Münzen kaufen</button>
    </div>

    <!-- Die Münze -->
    <div class="coin-visual" id="coin">🪙</div>

    <!-- Spiel-Einstellungen -->
    <div style="max-width: 400px; margin: 0 auto;">
        <p>Wähle deine Seite:</p>
        <div class="controls">
            <button class="btn-choice active" id="btn-heads" onclick="setChoice('KOPF')">KOPF</button>
            <button class="btn-choice" id="btn-tails" onclick="setChoice('ZAHL')">ZAHL</button>
        </div>

        <div class="input-group">
            <label>Einsatz: </label>
            <input type="number" id="bet-amount" value="10" min="1"> Coins
        </div>

        <button class="btn-main" id="flip-btn" onclick="playGame()">Münze werfen (Flip!)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('game_balance')) || 0;
        let currentChoice = 'KOPF';
        
        const balanceDisplay = document.getElementById('balance');
        const coinDisplay = document.getElementById('coin');

        balanceDisplay.innerText = balance;

        function setChoice(choice) {
            currentChoice = choice;
            document.getElementById('btn-heads').classList.toggle('active', choice === 'KOPF');
            document.getElementById('btn-tails').classList.toggle('active', choice === 'ZAHL');
        }

        // ---- SPIEL-LOGIK ----
        function playGame() {
            const betInput = document.getElementById('bet-amount');
            const bet = parseInt(betInput.value);

            // 1. Prüfen, ob genug Münzen da sind
            if (bet > balance) {
                tg.showAlert("Du hast nicht genug Münzen! Bitte lade dein Guthaben auf.");
                return;
            }
            if (bet <= 0 || isNaN(bet)) {
                tg.showAlert("Ungültiger Einsatz!");
                return;
            }

            // Einsatz abziehen
            balance -= bet;
            updateBalance();

            // Münz-Animation starten
            coinDisplay.classList.add('flip-animation');
            document.getElementById('flip-btn').disabled = true;

            setTimeout(() => {
                // Zufall entscheiden lassen (50/50 Chance)
                const sides = ['KOPF', 'ZAHL'];
                const result = sides[Math.floor(Math.random() * sides.length)];
                
                coinDisplay.innerText = result === 'KOPF' ? '👑' : '🔢';
                coinDisplay.classList.remove('flip-animation');
                document.getElementById('flip-btn').disabled = false;

                // Gewinn-Auswertung
                if (currentChoice === result) {
                    const winAmount = bet * 2;
                    balance += winAmount;
                    tg.showAlert(`Gewonnen! 🎉 Die Münze zeigte ${result}. Du erhältst ${winAmount} Coins!`);
                } else {
                    tg.showAlert(`Verloren! 😢 Die Münze zeigte ${result}. Deine ${bet} Coins sind weg.`);
                }
                
                updateBalance();
            }, 600); // Animation dauert 0.6 Sekunden
        }

        function updateBalance() {
            balanceDisplay.innerText = balance;
            localStorage.setItem('game_balance', balance);
        }

        // ---- MÜNZEN KAUFEN (INTEGRATION) ----
        document.getElementById('buy-coins-btn').addEventListener('click', () => {
            // Hier kommt die echte Zahlungsaufforderung hin.
            // Für Telegram Stars würde man eine API-Anfrage an deinen Bot senden.
            
            tg.showConfirm("Möchtest du 100 Münzen für 50 Telegram Stars kaufen?", (confirmed) => {
                if (confirmed) {
                    // Das ist aktuell nur lokal simuliert. 
                    // Für echte Käufe musst du die Telegram Invoice-API in deinem Bot-Backend nutzen!
                    balance += 100;
                    updateBalance();
                    tg.showAlert("Kauf erfolgreich! 100 Coins wurden gutgeschrieben.");
                }
            });
        });
    </script>
</body>
</html>
